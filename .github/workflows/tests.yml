name: 🧪 Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'eslint.config.mjs'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'eslint.config.mjs'
      - '.github/workflows/tests.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: 🧪 Run tests
        working-directory: ./backend
        run: |
          pytest tests/ -v --tb=short

      - name: 📊 Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed. Check logs above for details." >> $GITHUB_STEP_SUMMARY

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🔎 Typecheck
        run: npm run typecheck

      - name: 🏗️ Build
        run: npm run build
